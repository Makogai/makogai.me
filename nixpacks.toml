[phases.setup]
nixPkgs = [
  "php84",
  "php84Packages.composer",
  "nodejs"
]

[phases.install]
cmds = [
  "composer install --no-dev --optimize-autoloader",
  "npm install"
]

[phases.build]
cmds = [
  "npm run build",
  "php artisan config:cache",
  "php artisan route:cache",
  "php artisan view:cache"
]

[variables]
APP_ENV = "production"
APP_DEBUG = "false"